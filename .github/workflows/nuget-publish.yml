name: 📦 NuGet Package Build & Publish

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Directory.Build.props'
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force publish to NuGet.org'
        required: false
        type: boolean
        default: false

env:
  DOTNET_VERSION: '10.0.x'
  BUILD_CONFIGURATION: 'Release'

jobs:
  detect-version:
    name: 🔍 Detect Version Changes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 📊 Extract Version from Directory.Build.props
        id: extract-version
        run: |
          VERSION=$(grep -oP '(?<=<VersionPrefix>)[^<]*' Directory.Build.props)
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  publish:
    name: 📦 Build & Publish
    runs-on: ubuntu-latest
    needs: detect-version
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Create FileFlux.Core NuGet Package
        run: |
          dotnet pack src/FileFlux.Core/FileFlux.Core.csproj \
            --configuration Release \
            --output nupkg/ \
            -p:PackageVersion=${{ needs.detect-version.outputs.version }} \
            -p:AssemblyVersion=${{ needs.detect-version.outputs.version }} \
            -p:FileVersion=${{ needs.detect-version.outputs.version }}

      - name: 📦 Create FileFlux NuGet Package
        run: |
          dotnet pack src/FileFlux/FileFlux.csproj \
            --configuration Release \
            --output nupkg/ \
            -p:PackageVersion=${{ needs.detect-version.outputs.version }} \
            -p:AssemblyVersion=${{ needs.detect-version.outputs.version }} \
            -p:FileVersion=${{ needs.detect-version.outputs.version }}

      - name: 📋 List Generated Packages
        run: ls -la nupkg/

      - name: 🚀 Publish FileFlux.Core to NuGet.org
        run: |
          for package in nupkg/FileFlux.Core.*.nupkg; do
            echo "Publishing Core: $package..."
            dotnet nuget push "$package" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate \
              --no-symbols
          done
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: 🚀 Publish FileFlux SDK to NuGet.org
        run: |
          for package in nupkg/FileFlux.[0-9]*.nupkg; do
            echo "Publishing SDK: $package..."
            dotnet nuget push "$package" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate \
              --no-symbols
          done
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: 🏷️ Create Git Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag "v${{ needs.detect-version.outputs.version }}"
          git push origin "v${{ needs.detect-version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-completion:
    name: 📢 Notify Completion
    runs-on: ubuntu-latest
    needs: [detect-version, publish]
    if: always()
    steps:
      - name: 🎉 Success Notification
        if: needs.publish.result == 'success'
        run: |
          echo "🎉 Successfully published FileFlux v${{ needs.detect-version.outputs.version }} to NuGet.org!"
          echo "📦 Core: https://www.nuget.org/packages/FileFlux.Core/${{ needs.detect-version.outputs.version }}"
          echo "📦 SDK: https://www.nuget.org/packages/FileFlux/${{ needs.detect-version.outputs.version }}"

      - name: ❌ Failure Notification
        if: needs.publish.result != 'success'
        run: |
          echo "❌ Failed to publish FileFlux v${{ needs.detect-version.outputs.version }}"
          exit 1
